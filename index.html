<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cotización</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <img src="img/Kat.png" alt="Logo Kat">
    <div>
      <h1>CidZa, S.A.</h1>
      <h2>REPRESENTACIONES</h2>
      <p>29 Avenida 30-46 zona 5, Colonia 20 de Octubre<br>Tel: 3404 7715 Xela 4469 1143</p>
    </div>
    <img src="img/Ilva.png" alt="Logo ILVA">
  </header>

  <h2>Cotización</h2>
  <table id="cotizacion">
    <thead>
      <tr>
        <th>Área / Producto</th>
        <th>Unidad</th>
        <th>Cantidad</th>
        <th>Precio</th>
        <th>Subtotal</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><input type="text" placeholder="Ej. Pared frontal"></td>
        <td>
          <select>
            <option value="m2">m²</option>
            <option value="m3">m3</option>
            <option value="Ml">Ml</option>
            <option value="yd2">yd²</option>
            <option value="yd">yd</option>
            <option value="ft2">ft²</option>
            <option value="ft">ft</option>
            <option value="Kg">Kg</option>
            <option value="Lb">Lb</option>
            <option value="Oz">Oz</option>
            <option value="gr">gr</option>
            <option value="pieza">pieza</option>
            <option value="caja">caja</option>
            <option value="unidad">unidad</option>
          </select>
        </td>
        <td><input type="number" value="0"></td>
        <td><input type="number" value="0"></td>
        <td class="subtotal">0</td>
      </tr>
    </tbody>
  </table>
  <button onclick="agregarFila()">Agregar fila</button>
  <button onclick="descargarPDF()">Descargar PDF</button>
  <h3>Total: Q<span id="total">0</span></h3>

  <!-- Librerías jsPDF y autoTable -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
