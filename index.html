<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cotización</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Encabezado con logos y datos -->
  <header>
    <img src="img/Kat.png" alt="Logo Kat">
    <div>
      <h1>CidZa, S.A.</h1>
      <h2>REPRESENTACIONES</h2>
      <p>29 Avenida 30-46 zona 5, Colonia 20 de Octubre<br>Tel: 3404 7715 Xela 4469 1143</p>
    </div>
    <img src="img/Ilva.png" alt="Logo ILVA">
  </header>

  <h2>Cotización</h2>
  <table id="cotizacion">
    <thead>
      <tr>
        <th>Código</th>
        <th>Área / Producto</th>
        <th>Unidad</th>
        <th>Cantidad</th>
        <th>Precio</th>
        <th>Subtotal</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <!-- Columna Código con autocompletado -->
        <td>
          <input list="codigos" placeholder="Ej. TA901">
          <datalist id="codigos">
            <option value="TA901">
            <option value="PA79">
            <option value="PA420">
            <option value="FA1905">
            <option value="TO07">
            <option value="TP21">
            <option value="TX24">
            <option value="TZ35">
            <option value="TM84">
            <option value="TS18">
            <option value="TR1790">
            <option value="TNS201">
            <option value="PR30">
            <option value="A090220">
            <option value="EPL7914 P80">
            <option value="DVAF600">
          </datalist>
        </td>
        <!-- Área / Producto -->
        <td><input type="text" placeholder="Ej. Fondo Poliuretano Transparente"></td>
        <!-- Unidades reducidas -->
        <td>
          <select>
            <option value="Cub25">Cub 25</option>
            <option value="Cub12.5">Cub 12.5</option>
            <option value="Galon">Galón</option>
            <option value="Litro">Litro</option>
            <option value="Gal5L">Gal 5L</option>
            <option value="unidad">Unidad</option>
          </select>
        </td>
        <td><input type="number" value="0"></td>
        <td><input type="number" value="0"></td>
        <td class="subtotal">0</td>
      </tr>
    </tbody>
  </table>

  <button onclick="agregarFila()">Agregar fila</button>
  <button onclick="descargarPDF()">Descargar PDF</button>
  <h3>Total: Q<span id="total">0</span></h3>

  <!-- Librerías jsPDF y autoTable -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
