<!DOCTYPE html>
<html lang="es">

  <title>Cotización</title>
  <link rel="stylesheet" href="style.css">

  <!-- Encabezado con logos y datos -->
  <header>
    <img src="img/Kat.png" alt="Logo Kat">
    <div>
      <h1>CidZa, S.A.</h1>
      <h2>REPRESENTACIONES</h2>
      <p>29 Avenida 30-46 zona 5, Colonia 20 de Octubre<br>Tel: 3404 7715 Xela 4469 1143</p>

    <img src="img/Ilva.png" alt="Logo ILVA">

  <!-- Bloque de datos del cliente -->
<h3>Datos del Cliente</h3>
<div class="cliente-form">
  <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
  <input type="text" id="direccionCliente" placeholder="Dirección">
  <input type="text" id="ciudadCliente" placeholder="Ciudad">
  <input type="text" id="estadoCliente" placeholder="Estado">
  <input type="text" id="telefonoCliente" placeholder="Teléfono">
</div>
